<!DOCTYPE html>
<html lang="en" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - ECMS Federal University Dutse</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { milk: '#fffcf9', rust: '#a73a22', mahogany: '#4a1e15' },
                    animation: { 'blob': 'blob 7s infinite' },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                } 
            }
        }
    </script>
</head>
<body class="min-h-[100dvh] flex items-center justify-center relative overflow-hidden font-sans bg-slate-900 selection:bg-rust selection:text-white">

    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=2086&auto=format&fit=crop" alt="University Campus" class="w-full h-full object-cover opacity-60 dark:opacity-40" />
        <div class="absolute inset-0 bg-white/30 dark:bg-slate-950/80 backdrop-blur-md transition-colors duration-500"></div>
    </div>

    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-orange-400 dark:bg-orange-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob z-0"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-blue-400 dark:bg-blue-900 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-2000 z-0"></div>

    <div class="absolute top-6 right-6 z-20">
        <button class="theme-toggle btn btn-circle bg-white/50 dark:bg-slate-800/50 backdrop-blur-md border border-white/40 dark:border-slate-700 text-stone-700 dark:text-stone-300 shadow-lg hover:bg-white dark:hover:bg-slate-700 transition-all">
            <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
        </button>
    </div>

    <div class="absolute top-6 left-6 z-20">
        <a href="index.html" class="btn btn-circle bg-white/50 dark:bg-slate-800/50 backdrop-blur-md border border-white/40 dark:border-slate-700 text-stone-700 dark:text-stone-300 shadow-lg hover:bg-white dark:hover:bg-slate-700 transition-all">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
    </div>

    <div class="relative z-10 w-full max-w-md p-8 sm:p-10 mx-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-2xl border border-white/50 dark:border-slate-700/50 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.5)] transition-all duration-300">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="assets/images/fud-logo.png" alt="FUD Crest" class="w-16 h-16 object-contain" onerror="this.outerHTML='<div class=\\'w-16 h-16 bg-gradient-to-br from-orange-100 to-orange-200 dark:from-slate-800 dark:to-slate-700 rounded-2xl flex items-center justify-center shadow-inner\\'><i data-lucide=\\'graduation-cap\\' class=\\'w-8 h-8 text-rust dark:text-orange-400\\'></i></div>'">
            </div>
            <h1 class="text-3xl font-extrabold text-mahogany dark:text-white tracking-tight mb-1 transition-colors">Welcome Back</h1>
            <p class="text-stone-500 dark:text-stone-400 text-sm font-medium">Log in to the ECMS Portal</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div class="form-control w-full">
                <label for="email" class="label pb-1"><span class="label-text font-bold text-stone-700 dark:text-stone-300">Email Address</span></label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-3.5 w-5 h-5 text-stone-400 dark:text-stone-500"></i>
                    <input type="email" id="email" required 
                        class="input w-full pl-12 bg-white/50 dark:bg-slate-950/50 border border-stone-200 dark:border-slate-700 focus:border-rust dark:focus:border-orange-500 focus:ring-2 focus:ring-rust/20 dark:focus:ring-orange-500/20 text-stone-800 dark:text-white placeholder-stone-400 dark:placeholder-stone-600 rounded-xl transition-all"
                        placeholder="student@gmail.com">
                </div>
            </div>

            <div class="form-control w-full">
                <div class="flex justify-between items-center pb-1 px-1">
                    <label for="password" class="label-text font-bold text-stone-700 dark:text-stone-300">Password</label>
                    <a href="#" class="text-xs font-semibold text-rust dark:text-orange-400 hover:text-mahogany dark:hover:text-orange-300 transition-colors">Forgot Password?</a>
                </div>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-stone-400 dark:text-stone-500"></i>
                    <input type="password" id="password" required 
                        class="input w-full pl-12 bg-white/50 dark:bg-slate-950/50 border border-stone-200 dark:border-slate-700 focus:border-rust dark:focus:border-orange-500 focus:ring-2 focus:ring-rust/20 dark:focus:ring-orange-500/20 text-stone-800 dark:text-white placeholder-stone-400 dark:placeholder-stone-600 rounded-xl transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="btn w-full mt-2 bg-rust hover:bg-mahogany dark:bg-orange-600 dark:hover:bg-orange-700 text-white border-none shadow-lg shadow-rust/30 dark:shadow-orange-900/30 rounded-xl h-12 text-base transition-all hover:-translate-y-0.5 group">
                Sign In
                <i data-lucide="arrow-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-stone-500 dark:text-stone-400">
            Don't have an account? 
            <a href="signup.html" class="font-bold text-rust dark:text-orange-400 hover:text-mahogany dark:hover:text-orange-300 transition-colors">Register here</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
        
        // Theme Toggle Logic
        const html = document.documentElement;
        const themeToggles = document.querySelectorAll('.theme-toggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        }
        themeToggles.forEach(toggle => {
            toggle.addEventListener('click', () => {
                html.classList.toggle('dark');
                localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
            });
        });
    </script>
    
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
