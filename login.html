<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECMS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom background image for the university vibe */
        body {
            background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>    
<body class="h-screen w-full flex items-center justify-center bg-gray-900 bg-opacity-70 font-sans">

    <div class="relative w-full max-w-md p-8 mx-4 bg-white/10 backdrop-blur-lg border border-white/20 rounded-2xl shadow-2xl">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">ECMS Portal</h1>
            <p class="text-gray-200 text-sm">Faculty of Education Counseling System</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-200 mb-1">Email Address</label>
                <input type="email" id="email" required 
                    class="w-full px-4 py-3 bg-white/20 border border-white/10 rounded-lg text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
                    placeholder="student@gmail.com">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-200">Password</label>
                    <a href="#" class="text-xs text-blue-300 hover:text-blue-100 transition-colors">Forgot Password?</a>
                </div>
                <input type="password" id="password" required 
                    class="w-full px-4 py-3 bg-white/20 border border-white/10 rounded-lg text-white placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-md transition-all duration-200 transform hover:scale-[1.02]">
                Sign In
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-300">
            Don't have an account? 
            <a href="signup.html" class="text-blue-300 hover:text-white font-semibold transition-colors">Register here</a>
        </p>
    </div>

    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
