<!DOCTYPE html>
<html lang="en" class="scroll-smooth transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session History - ECMS</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { milk: '#fffcf9', rust: '#a73a22', mahogany: '#4a1e15', mahoganyHover: '#36150f' } } } }</script>
</head>
<body data-theme="light" class="bg-milk dark:bg-slate-950 text-stone-800 dark:text-stone-200 font-sans antialiased overflow-hidden flex h-screen transition-colors duration-300 relative">

    <div class="absolute top-0 left-1/4 w-96 h-96 bg-orange-300 dark:bg-orange-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none z-0"></div>
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden transition-opacity lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-mahogany dark:bg-slate-900 text-white transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:flex flex-col shadow-2xl border-r border-white/10 dark:border-slate-800 relative z-50">
        <div class="flex items-center justify-center h-20 border-b border-white/10 bg-black/10">
            <h1 class="text-2xl font-black tracking-wider text-milk">ECMS<span class="text-rust dark:text-orange-500">.</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="student.html" class="flex items-center px-4 py-3 hover:bg-mahoganyHover dark:hover:bg-slate-800 rounded-xl text-stone-300 hover:text-white transition-colors">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> My Dashboard
            </a>
            <a href="student-history.html" class="flex items-center px-4 py-3 bg-white/10 dark:bg-slate-800 rounded-xl text-milk font-medium transition-colors shadow-sm border border-white/5 dark:border-slate-700">
                <i data-lucide="history" class="w-5 h-5 mr-3"></i> Session History
            </a>
            <a href="student-resources.html" class="flex items-center px-4 py-3 hover:bg-mahoganyHover dark:hover:bg-slate-800 rounded-xl text-stone-300 hover:text-white transition-colors">
                <i data-lucide="book-open" class="w-5 h-5 mr-3"></i> Resources
            </a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button id="logout-btn" class="flex items-center w-full px-4 py-3 bg-red-600/20 hover:bg-red-600/40 text-red-100 rounded-xl transition-colors group">
                <i data-lucide="log-out" class="w-5 h-5 mr-3 group-hover:-translate-x-1 transition-transform"></i> Sign Out
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative z-10">
        <header class="h-20 flex items-center justify-between px-6 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-stone-200 dark:border-slate-800 lg:justify-end shadow-sm">
            <button id="hamburger-btn" class="lg:hidden text-mahogany dark:text-white hover:text-rust focus:outline-none"><i data-lucide="menu" class="w-7 h-7"></i></button>
            <div class="flex items-center gap-4">
                <button class="theme-toggle btn btn-ghost btn-circle btn-sm text-stone-600 dark:text-stone-300">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i><i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold text-mahogany dark:text-white">Student Portal</p>
                    <p class="text-xs text-stone-500 dark:text-stone-400">History</p>
                </div>
                <div class="avatar placeholder"><div class="bg-rust dark:bg-orange-600 text-white rounded-full w-10 shadow-sm border-2 border-orange-100 dark:border-slate-700"><span class="font-bold">S</span></div></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 md:p-8">
            <div class="mb-8">
                <h2 class="text-3xl font-extrabold text-mahogany dark:text-white tracking-tight">Session History</h2>
                <p class="text-stone-500 dark:text-stone-400 mt-1">Review your past and pending counseling appointments.</p>
            </div>

            <div class="overflow-x-auto bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-white dark:border-slate-800 shadow-xl shadow-stone-200/50 dark:shadow-none p-2">
                <table class="table table-zebra w-full">
                    <thead class="bg-stone-50 dark:bg-slate-800 text-stone-600 dark:text-stone-300 text-sm rounded-xl overflow-hidden">
                    <tr>
                        <th class="rounded-tl-xl"><i data-lucide="calendar" class="w-4 h-4 inline mr-1"></i> Date & Time</th>
                        <th><i data-lucide="user" class="w-4 h-4 inline mr-1"></i> Counselor</th>
                        <th class="hidden md:table-cell"><i data-lucide="message-square" class="w-4 h-4 inline mr-1"></i> Reason</th>
                        <th class="rounded-tr-xl"><i data-lucide="activity" class="w-4 h-4 inline mr-1"></i> Status</th>
                    </tr>
                    </thead>
                    <tbody id="history-table-body" class="text-stone-700 dark:text-stone-300">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <dialog id="feedback_modal" class="modal modal-bottom sm:modal-middle backdrop-blur-sm">
        <div class="modal-box bg-white dark:bg-slate-900 rounded-3xl border border-stone-100 dark:border-slate-800 shadow-2xl">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4 text-stone-500 dark:text-stone-400"><i data-lucide="x" class="w-4 h-4"></i></button>
            </form>
            <div class="flex items-center gap-3 mb-2">
                <div class="p-2 bg-green-100 dark:bg-green-900/30 rounded-lg text-green-700 dark:text-green-400"><i data-lucide="star"></i></div>
                <h3 class="font-bold text-2xl text-mahogany dark:text-white">Session Feedback</h3>
            </div>
            <p class="text-sm text-stone-500 dark:text-stone-400 mb-6">Your feedback helps us improve our counseling services.</p>
            
            <form id="feedback-form" class="space-y-4">
                <input type="hidden" id="feedback-appointment-id">
                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-bold text-stone-700 dark:text-stone-300">How would you rate your session?</span></label>
                    <div class="rating rating-lg mt-2 justify-center gap-2">
                        <input type="radio" name="session-rating" value="1" class="mask mask-star-2 bg-rust dark:bg-orange-500" />
                        <input type="radio" name="session-rating" value="2" class="mask mask-star-2 bg-rust dark:bg-orange-500" />
                        <input type="radio" name="session-rating" value="3" class="mask mask-star-2 bg-rust dark:bg-orange-500" checked />
                        <input type="radio" name="session-rating" value="4" class="mask mask-star-2 bg-rust dark:bg-orange-500" />
                        <input type="radio" name="session-rating" value="5" class="mask mask-star-2 bg-rust dark:bg-orange-500" />
                    </div>
                </div>
                <div class="form-control w-full">
                    <label class="label"><span class="label-text font-bold text-stone-700 dark:text-stone-300">Comments (Optional)</span></label>
                    <textarea id="feedback-comments" class="textarea textarea-bordered h-24 bg-stone-50 dark:bg-slate-800 dark:border-slate-700 focus:border-rust dark:focus:border-orange-500 focus:ring-rust dark:text-white rounded-xl resize-none" placeholder="Share your thoughts..."></textarea>
                </div>
                <div class="modal-action mt-8">
                    <button type="button" onclick="feedback_modal.close()" class="btn btn-ghost rounded-xl dark:text-stone-300">Cancel</button>
                    <button type="submit" class="btn bg-rust hover:bg-mahogany dark:hover:bg-orange-600 text-white border-none px-8 rounded-xl shadow-lg shadow-rust/30"><i data-lucide="check" class="w-4 h-4 mr-2"></i> Submit Feedback</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop bg-slate-900/40 backdrop-blur-sm"><button>close</button></form>
    </dialog>

    <script>
        lucide.createIcons();
        const hamburgerBtn = document.getElementById('hamburger-btn'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        function toggleSidebar() { sidebar.classList.toggle('-translate-x-full'); overlay.classList.toggle('hidden'); }
        hamburgerBtn.addEventListener('click', toggleSidebar); overlay.addEventListener('click', toggleSidebar);

        const html = document.documentElement, themeToggles = document.querySelectorAll('.theme-toggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) html.classList.add('dark');
        themeToggles.forEach(toggle => toggle.addEventListener('click', () => { html.classList.toggle('dark'); localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light'; }));
    </script>
    <script type="module" src="../assets/js/app.js"></script>
    <script type="module" src="../assets/js/student-history.js"></script>
</body>
</html>
