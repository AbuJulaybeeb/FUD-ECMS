<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { milk: '#fffcf9', rust: '#a73a22', mahogany: '#4a1e15' } } } }
    </script>
</head>
<body data-theme="light" class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl hidden lg:flex">
        <div class="flex items-center justify-center h-20 border-b border-white/10 bg-slate-950">
            <h1 class="text-2xl font-bold tracking-wider text-white">ECMS<span class="text-blue-500">.</span>Admin</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="admin.html" class="flex items-center px-4 py-3 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-white transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Overview
            </a>
            <a href="admin-users.html" class="flex items-center px-4 py-3 bg-blue-600/20 text-blue-400 rounded-lg font-medium border border-blue-500/20">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg> User Management
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-full relative">
        <header class="h-20 flex items-center justify-end px-6 bg-white border-b border-stone-200">
            <div class="flex items-center gap-3">
                <div class="text-right">
                    <p class="text-sm font-bold text-slate-900">System Administrator</p>
                </div>
                <div class="avatar placeholder"><div class="bg-slate-900 text-white rounded-full w-10"><span class="font-bold">A</span></div></div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">User Management</h2>
                    <p class="text-slate-500 mt-1">Manage platform access for students and counselors.</p>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Search users..." class="input input-bordered input-sm w-64" />
                    <button class="btn btn-sm bg-slate-900 text-white hover:bg-slate-800">Add User</button>
                </div>
            </div>

            <div class="overflow-x-auto bg-white rounded-xl border border-stone-200 shadow-sm">
                <table class="table table-zebra w-full">
                    <thead class="bg-slate-50 text-slate-600">
                        <tr>
                            <th>Name / Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-users-tbody"></tbody>
                    <dialog id="add_user_modal" class="modal">
                        <div class="modal-box bg-white">
                            <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button></form>
                            <h3 class="font-bold text-xl text-slate-900 mb-4">Add New User</h3>
                            <form id="add-user-form" class="space-y-4">
                                <input type="text" id="new-user-name" placeholder="Full Name" class="input input-bordered w-full" required />
                                <input type="email" id="new-user-email" placeholder="Email Address" class="input input-bordered w-full" required />
                                <select id="new-user-role" class="select select-bordered w-full" required>
                                    <option value="student">Student</option>
                                    <option value="counselor">Counselor</option>
                                </select>
                                <button type="submit" class="btn bg-slate-900 text-white w-full hover:bg-slate-800">Create Profile</button>
                            </form>
                        </div>
                        <form method="dialog" class="modal-backdrop"><button>close</button></form>
                    </dialog>
                </table>
            </div>
        </main>
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        function toggleSidebar() { sidebar.classList.toggle('-translate-x-full'); overlay.classList.toggle('hidden'); }
        hamburgerBtn.addEventListener('click', toggleSidebar); overlay.addEventListener('click', toggleSidebar);
    </script>
    <script type="module" src="../assets/app.js"></script>
    <script type="module" src="../assets/js/admin-users.js"></script>
</body>
</html>
